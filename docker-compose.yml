version: '3.8'

services:
  firered-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: firered-image-api
    ports:
      - "8080:8080"
    environment:
      - HF_HOME=/workspace/huggingface_cache
      - TMPDIR=/workspace/tmp
      - TORCH_HOME=/workspace/torch_cache
    volumes:
      - ./cache:/workspace/huggingface_cache
      - ./tmp:/workspace/tmp
      - ./torch_cache:/workspace/torch_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
